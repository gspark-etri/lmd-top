# Vendor model zoo — Furiosa(RNGD) / Rebellions(RBLN) 로 컴파일·서빙 가능한 공개 모델 목록.
# lmd-top Deploy▸Zoo 뷰가 렌더 → ⏎ 로 Prefetch(가중치 다운로드)·Compile→벤더.
# 컴파일 가능 벤더는 src/npu-compat.json(패밀리 지원) 에서 자동 판정한다(여기 명시 불필요).
# source 는 Hugging Face repo id(org/name) — 컴파일/프리페치가 이 id 로 가중치를 받는다.
# 커스터마이즈: LMD_ZOO=<path.yaml> 로 이 목록을 대체.
#
# 출처: Furiosa Supported Models(developer.furiosa.ai) · Rebellions rbln-model-zoo / optimum-rbln.
